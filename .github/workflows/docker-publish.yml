name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build backend (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: web
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm build --mode production

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: "**/go.sum"

      - name: Setup musl toolchain for ARM64
        if: matrix.goarch == 'arm64'
        uses: ./.github/actions/setup-musl-toolchain
        with:
          toolchain-version: "2025-6-20"
          archive-name: aarch64-linux-musl-cross.tgz
          archive-sha256: ""

      - name: Build backend binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-musl-gcc' || 'gcc' }}
        run: |
          set -euo pipefail
          if [ "${GOARCH}" = "arm64" ]; then
            SQLITE_INC="${RUNNER_TEMP}/sqlite-include"
            mkdir -p "${SQLITE_INC}"
            go mod download github.com/mattn/go-sqlite3
            MATTN_DIR="$(go list -m -f '{{.Dir}}' github.com/mattn/go-sqlite3)"
            test -f "${MATTN_DIR}/sqlite3-binding.h"
            cp "${MATTN_DIR}/sqlite3-binding.h" "${SQLITE_INC}/sqlite3.h"
            export CGO_CFLAGS="-I${SQLITE_INC} -Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t -Wno-typedef-redefinition -fno-sanitize=undefined"
          fi
          STATIC_LDFLAGS="-linkmode external -extldflags '-static'"
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "ech0-linux-${GOARCH}" ./cmd/ech0/main.go

      - name: Upload backend binary
        uses: actions/upload-artifact@v7
        with:
          name: ech0-linux-${{ matrix.goarch }}
          path: ech0-linux-${{ matrix.goarch }}
          retention-days: 1

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download backend binaries
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-linux-*
          path: backend-artifacts
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
